<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>~STAFF_STUDIO~ | архив</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0d10;
            padding: 1.5rem;
            /* ЖЁЛТО-КРАСНЫЙ ТУМАН — анимированный градиент */
            background: radial-gradient(ellipse at 20% 50%, rgba(200, 50, 0, 0.6), rgba(255, 200, 0, 0.2), transparent 70%),
                        radial-gradient(ellipse at 80% 80%, rgba(255, 100, 0, 0.5), rgba(200, 50, 0, 0.2), transparent 60%),
                        radial-gradient(ellipse at 50% 20%, rgba(255, 150, 0, 0.4), rgba(200, 50, 0, 0.1), transparent 50%),
                        #1a0a05;
            background-blend-mode: screen, overlay, normal;
            background-size: 100% 100%, 100% 100%, 100% 100%;
            animation: fogMove 8s ease-in-out infinite alternate;
            position: relative;
            overflow: hidden;
        }

        /* Анимация движения тумана */
        @keyframes fogMove {
            0% {
                background-position: 0% 0%, 0% 0%, 0% 0%;
                background-size: 100% 100%, 100% 100%, 100% 100%;
            }
            25% {
                background-position: 10% 5%, -5% 10%, 5% -5%;
                background-size: 120% 110%, 110% 120%, 130% 100%;
            }
            50% {
                background-position: -5% 10%, 15% 0%, -10% 10%;
                background-size: 110% 130%, 130% 100%, 100% 120%;
            }
            75% {
                background-position: 10% -5%, 0% 15%, 10% 5%;
                background-size: 130% 100%, 100% 130%, 120% 110%;
            }
            100% {
                background-position: 0% 0%, 0% 0%, 0% 0%;
                background-size: 100% 100%, 100% 100%, 100% 100%;
            }
        }

        /* Затемнение для читаемости текста */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 5, 3, 0.5);
            z-index: 0;
            pointer-events: none;
        }

        /* ============================================================ */
        /* КНИГА — появляется каждые 10 секунд на 3 секунды */
        /* ============================================================ */
        .book-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .book-overlay.visible {
            opacity: 1;
        }

        .book-icon {
            font-size: 10rem;
            color: #ffcc44;
            text-shadow: 0 0 60px rgba(255, 200, 50, 0.4),
                         0 0 120px rgba(255, 150, 30, 0.2),
                         0 0 200px rgba(255, 100, 0, 0.1);
            animation: bookFloat 3s ease-in-out forwards;
            transform-origin: center;
        }

        @keyframes bookFloat {
            0% {
                transform: scale(0.5) rotate(-10deg) translateY(30px);
                opacity: 0;
            }
            20% {
                transform: scale(1.1) rotate(2deg) translateY(-10px);
                opacity: 1;
            }
            40% {
                transform: scale(1) rotate(0deg) translateY(0px);
                opacity: 1;
            }
            70% {
                transform: scale(1) rotate(0deg) translateY(0px);
                opacity: 1;
            }
            85% {
                transform: scale(1.05) rotate(3deg) translateY(-5px);
                opacity: 1;
            }
            100% {
                transform: scale(0.6) rotate(8deg) translateY(40px);
                opacity: 0;
            }
        }

        .archive-content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            opacity: 0;
            clip-path: inset(100% 0% 0% 0%);
            transform: scale(0.95);
        }

        .archive-content.appear-stripes {
            animation: appearStripes 1.2s ease forwards;
        }

        @keyframes appearStripes {
            0% {
                opacity: 0;
                clip-path: inset(100% 0% 0% 0%);
                transform: scale(0.95);
            }
            15% {
                opacity: 0.2;
                clip-path: inset(80% 0% 0% 0%);
            }
            30% {
                opacity: 0.4;
                clip-path: inset(60% 0% 0% 0%);
            }
            45% {
                opacity: 0.6;
                clip-path: inset(40% 0% 0% 0%);
            }
            60% {
                opacity: 0.8;
                clip-path: inset(20% 0% 0% 0%);
            }
            75% {
                opacity: 0.9;
                clip-path: inset(10% 0% 0% 0%);
            }
            90% {
                opacity: 1;
                clip-path: inset(2% 0% 0% 0%);
            }
            100% {
                opacity: 1;
                clip-path: inset(0% 0% 0% 0%);
                transform: scale(1);
            }
        }

        .progress-label {
            font-size: 8rem;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #ff3b3b, #cc0000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 60px rgba(255, 0, 0, 0.15);
            line-height: 1;
            margin-bottom: 1.5rem;
        }

        .progress-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 60px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .progress-bar {
            height: 20px;
            width: 1%;
            background: linear-gradient(90deg, #ff3b3b, #cc0000);
            border-radius: 60px;
            transition: width 1.5s ease;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .archive-toggle {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 0.5rem;
            cursor: pointer;
            user-select: none;
        }

        .archive-arrow {
            font-size: 2.5rem;
            color: #ff3333;
            transition: transform 0.4s ease, color 0.3s ease;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.1);
            display: inline-block;
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 0, 0, 0.05);
            background: rgba(255, 0, 0, 0.02);
        }

        .archive-arrow:hover {
            color: #ff5555;
            text-shadow: 0 0 40px rgba(255, 0, 0, 0.2);
            border-color: rgba(255, 0, 0, 0.1);
        }

        .archive-arrow.open {
            transform: rotate(180deg);
        }

        .archive-column {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1), 
                        opacity 0.5s ease, 
                        padding 0.5s ease;
            opacity: 0;
            padding: 0 20px;
            width: 100%;
        }

        .archive-column.open {
            max-height: 200px;
            opacity: 1;
            padding: 16px 20px 8px 20px;
        }

        .archive-column-inner {
            background: rgba(255, 0, 0, 0.03);
            border: 1px solid rgba(255, 0, 0, 0.06);
            border-radius: 16px;
            padding: 16px 20px;
            backdrop-filter: blur(4px);
        }

        .archive-column-inner .archive-status {
            font-size: 2rem;
            font-weight: 700;
            color: #ff2222;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0 0 40px rgba(255, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin: 0;
        }

        .archive-column-inner .archive-status i {
            color: #ff3333;
            font-size: 1.6rem;
        }

        .back-link {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 2;
            color: #b08a60;
            font-size: 0.8rem;
            text-decoration: none;
            transition: 0.3s;
            letter-spacing: 1px;
            font-weight: 400;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 200, 100, 0.1);
            backdrop-filter: blur(4px);
        }

        .back-link:hover {
            color: #ffcc66;
            border-color: rgba(255, 200, 100, 0.2);
        }

        .back-link i {
            margin-right: 6px;
        }

        .secret-link {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 2;
            display: block;
            width: 60px;
            height: 60px;
            background: transparent;
            border: none;
            cursor: pointer;
            opacity: 0;
            pointer-events: auto;
        }

        .secret-hint {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 1px dashed rgba(255, 200, 100, 0.03);
            pointer-events: none;
            transition: 0.4s;
        }

        .secret-hint::after {
            content: '⬡';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 200, 100, 0.02);
            font-size: 1.2rem;
            animation: pulseHint 4s infinite;
        }

        @keyframes pulseHint {
            0%, 100% { opacity: 0.2; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
        }

        .secret-link:hover + .secret-hint {
            border-color: rgba(255, 200, 100, 0.1);
        }
        .secret-link:hover + .secret-hint::after {
            color: rgba(255, 200, 100, 0.1);
        }

        @media (max-width: 600px) {
            .progress-label {
                font-size: 5rem;
            }
            .archive-arrow {
                font-size: 2rem;
            }
            .archive-column-inner .archive-status {
                font-size: 1.4rem;
                letter-spacing: 4px;
            }
            .progress-container {
                max-width: 300px;
            }
            .secret-link {
                width: 50px;
                height: 50px;
                bottom: 20px;
                right: 20px;
            }
            .secret-hint {
                width: 50px;
                height: 50px;
                bottom: 20px;
                right: 20px;
            }
            .book-icon {
                font-size: 6rem;
            }
        }
    </style>
</head>
<body>
    <!-- КНИГА (появляется раз в 10 секунд) -->
    <div class="book-overlay" id="bookOverlay">
        <div class="book-icon">
            <i class="fas fa-book-open"></i>
        </div>
    </div>

    <div class="archive-content" id="archiveContent">

        <div class="progress-label">1%</div>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <div class="archive-toggle" id="archiveToggle">
            <div class="archive-arrow" id="archiveArrow">
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="archive-column" id="archiveColumn">
                <div class="archive-column-inner">
                    <div class="archive-status">
                        <i class="fas fa-lock"></i> заархивировано
                    </div>
                </div>
            </div>
        </div>
    </div>

    <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> назад
    </a>

    <a href="https://qwe123zxc0909.github.io/Gearssite.github.io/" 
       class="secret-link" 
       target="_blank" 
       title=" ">
    </a>
    <div class="secret-hint"></div>

    <script>
        // ===== ТОГГЛ СТОЛБЦА =====
        const toggle = document.getElementById('archiveToggle');
        const arrow = document.getElementById('archiveArrow');
        const column = document.getElementById('archiveColumn');

        toggle.addEventListener('click', function(e) {
            e.stopPropagation();
            arrow.classList.toggle('open');
            column.classList.toggle('open');
        });

        // ===== ПОЯВЛЕНИЕ СТРАНИЦЫ =====
        const content = document.getElementById('archiveContent');
        setTimeout(() => {
            content.classList.add('appear-stripes');
        }, 100);

        // ================================================================
        // КНИГА — ПОЯВЛЯЕТСЯ КАЖДЫЕ 10 СЕКУНД НА 3 СЕКУНДЫ
        // ================================================================
        const bookOverlay = document.getElementById('bookOverlay');
        let bookTimeout = null;
        let isBookVisible = false;

        function showBook() {
            // Если книга уже видна — не запускаем повторно
            if (isBookVisible) return;
            
            isBookVisible = true;
            bookOverlay.classList.add('visible');

            // Через 3 секунды скрываем
            setTimeout(() => {
                bookOverlay.classList.remove('visible');
                isBookVisible = false;
            }, 3000);
        }

        // Запускаем показ книги с циклом 10 секунд
        function startBookLoop() {
            // Первый показ через 2 секунды после загрузки
            setTimeout(() => {
                showBook();
                
                // Затем каждые 10 секунд
                setInterval(() => {
                    showBook();
                }, 10000);
            }, 2000);
        }

        startBookLoop();

        // Останавливаем показ книги, если пользователь взаимодействует со страницей
        // (чтобы не мешать)
        document.addEventListener('click', function() {
            // Не блокируем, просто продолжаем цикл
        });
    </script>
</body>
</html>
