<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>~STAFF_STUDIO~ | архив</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0d10;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 1.5s ease-in-out;
            padding: 1.5rem;
        }

        /* Затемнение фона */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 13, 16, 0.75);
            z-index: 0;
        }

        /* ЦЕНТРАЛЬНЫЙ БЛОК — без коробочки, только текст */
        .archive-content {
            position: relative;
            z-index: 1;
            text-align: center;
            animation: fadeIn 1.2s ease-out;
            padding: 2rem;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .progress-label {
            font-size: 8rem;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #ff3b3b, #cc0000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 60px rgba(255, 0, 0, 0.2);
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .archive-status {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ff2222;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0 0 40px rgba(255, 0, 0, 0.15);
            border-top: 2px solid rgba(255, 0, 0, 0.15);
            padding-top: 1.2rem;
            display: inline-block;
        }

        .archive-status i {
            margin-right: 14px;
            color: #ff3333;
        }

        /* МАЛЕНЬКАЯ СТРЕЛКА НАЗАД (не скрытая) */
        .back-link {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 2;
            color: #3a5a7a;
            font-size: 0.8rem;
            text-decoration: none;
            transition: 0.3s;
            letter-spacing: 1px;
            font-weight: 400;
            background: rgba(11, 13, 16, 0.5);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(30, 80, 180, 0.1);
            backdrop-filter: blur(4px);
        }

        .back-link:hover {
            color: #6a9eff;
            border-color: #4f8eff;
        }

        .back-link i {
            margin-right: 6px;
        }

        /* ============================================================ */
        /* СКРЫТАЯ КНОПКА — совсем невидимая, но кликабельная */
        /* ============================================================ */
        .secret-link {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 2;
            display: block;
            width: 60px;
            height: 60px;
            background: transparent;
            border: none;
            cursor: pointer;
            /* Абсолютно невидима */
            opacity: 0;
            pointer-events: auto; /* чтобы работал клик */
            transition: none;
        }

        /* Подсказка для "легко обнаружить" — появляется только при наведении на область */
        .secret-hint {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 1px dashed rgba(255, 255, 255, 0.05);
            pointer-events: none;
            transition: 0.4s;
        }

        /* Анимация подсказки — едва заметное мерцание */
        .secret-hint::after {
            content: '⬡';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.03);
            font-size: 1.2rem;
            animation: pulseHint 4s infinite;
        }

        @keyframes pulseHint {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* При наведении на область — подсказка становится чуть виднее */
        .secret-link:hover + .secret-hint {
            border-color: rgba(100, 150, 255, 0.15);
        }

        .secret-link:hover + .secret-hint::after {
            color: rgba(100, 150, 255, 0.15);
        }

        /* Адаптив */
        @media (max-width: 600px) {
            .progress-label {
                font-size: 5rem;
            }
            .archive-status {
                font-size: 1.8rem;
                letter-spacing: 4px;
            }
            .secret-link {
                width: 50px;
                height: 50px;
                bottom: 20px;
                right: 20px;
            }
            .secret-hint {
                width: 50px;
                height: 50px;
                bottom: 20px;
                right: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="archive-content">
        <div class="progress-label">98%</div>
        <div class="archive-status">
            <i class="fas fa-lock"></i> заархивировано
        </div>
    </div>

    <!-- Кнопка "назад" — видимая, в левом нижнем углу -->
    <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> назад
    </a>

    <!-- ============================================================ -->
    <!-- СКРЫТАЯ КНОПКА (невидимая) — ведёт на Gearssite -->
    <!-- ============================================================ -->
    <a href="https://qwe123zxc0909.github.io/Gearssite.github.io/" 
       class="secret-link" 
       target="_blank" 
       title=" ">
    </a>
    <!-- Подсказка-призрак (чтобы было легко обнаружить) -->
    <div class="secret-hint"></div>

    <script>
        // Тот же фон, что и на главной
        const images = [
            'images/0000.png',
            'images/0002.png',
            'images/0003.png',
            'images/cvhkm1.png',
            'images/fhjkl.png',
            'images/fvhjkl.png',
            'images/h,.png'
        ];

        let currentIndex = 0;

        function changeBackground() {
            document.body.style.backgroundImage = `url('${images[currentIndex]}')`;
            currentIndex = (currentIndex + 1) % images.length;
        }

        changeBackground();
        setInterval(changeBackground, 10000);
    </script>
</body>
</html>
