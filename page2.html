<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>~STAFF_STUDIO~ | архив</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0d10;
            /* БЕЗ ЗАДНЕГО ФОНА — только чёрный */
            padding: 1.5rem;
        }

        .archive-content {
            text-align: center;
            animation: fadeIn 1.2s ease-out;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .progress-label {
            font-size: 8rem;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #ff3b3b, #cc0000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 60px rgba(255, 0, 0, 0.15);
            line-height: 1;
            margin-bottom: 1.5rem;
        }

        /* ШКАЛА ПРОГРЕССА — 1% */
        .progress-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 60px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .progress-bar {
            height: 20px;
            width: 1%;
            background: linear-gradient(90deg, #ff3b3b, #cc0000);
            border-radius: 60px;
            transition: width 1.5s ease;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        /* Лёгкая анимация свечения */
        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .archive-status {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ff2222;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0 0 40px rgba(255, 0, 0, 0.1);
            margin-top: 0.5rem;
        }

        .archive-status i {
            margin-right: 14px;
            color: #ff3333;
        }

        /* Кнопка назад — в левом нижнем углу */
        .back-link {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 2;
            color: #3a5a7a;
            font-size: 0.8rem;
            text-decoration: none;
            transition: 0.3s;
            letter-spacing: 1px;
            font-weight: 400;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(4px);
        }

        .back-link:hover {
            color: #6a9eff;
            border-color: rgba(100, 150, 255, 0.2);
        }

        .back-link i {
            margin-right: 6px;
        }

        /* СКРЫТАЯ КНОПКА — невидимая, но кликабельная */
        .secret-link {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 2;
            display: block;
            width: 60px;
            height: 60px;
            background: transparent;
            border: none;
            cursor: pointer;
            opacity: 0;
            pointer-events: auto;
        }

        /* Подсказка-призрак для обнаружения */
        .secret-hint {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 1px dashed rgba(255, 255, 255, 0.03);
            pointer-events: none;
            transition: 0.4s;
        }

        .secret-hint::after {
            content: '⬡';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.02);
            font-size: 1.2rem;
            animation: pulseHint 4s infinite;
        }

        @keyframes pulseHint {
            0%, 100% { opacity: 0.2; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
        }

        .secret-link:hover + .secret-hint {
            border-color: rgba(100, 150, 255, 0.1);
        }

        .secret-link:hover + .secret-hint::after {
            color: rgba(100, 150, 255, 0.1);
        }

        /* Адаптив */
        @media (max-width: 600px) {
            .progress-label {
                font-size: 5rem;
            }
            .archive-status {
                font-size: 1.6rem;
                letter-spacing: 4px;
            }
            .progress-container {
                max-width: 300px;
            }
            .secret-link {
                width: 50px;
                height: 50px;
                bottom: 20px;
                right: 20px;
            }
            .secret-hint {
                width: 50px;
                height: 50px;
                bottom: 20px;
                right: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="archive-content">
        <!-- Проценты -->
        <div class="progress-label">1%</div>

        <!-- Шкала прогресса (1%) -->
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <!-- Надпись "заархивировано" красным -->
        <div class="archive-status">
            <i class="fas fa-lock"></i> заархивировано
        </div>
    </div>

    <!-- Кнопка "назад" — видимая -->
    <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> назад
    </a>

    <!-- СКРЫТАЯ КНОПКА (невидимая) — ведёт на Gearssite -->
    <a href="https://qwe123zxc0909.github.io/Gearssite.github.io/" 
       class="secret-link" 
       target="_blank" 
       title=" ">
    </a>
    <!-- Подсказка-призрак -->
    <div class="secret-hint"></div>
</body>
</html>
