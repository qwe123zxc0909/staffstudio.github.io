<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>~STAFF_STUDIO~ | архив</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0d10;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* ===== ТУМАН ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: 
                radial-gradient(ellipse at 80% 50%, rgba(200, 50, 30, 0.08), transparent 50%),
                radial-gradient(ellipse at 20% 50%, rgba(255, 200, 50, 0.06), transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(180, 40, 20, 0.05), transparent 40%),
                radial-gradient(ellipse at 40% 20%, rgba(255, 180, 40, 0.04), transparent 40%);
            animation: fogDrift 12s ease-in-out infinite alternate;
        }

        @keyframes fogDrift {
            0% { background-position: 0% 0%, 0% 0%, 0% 0%, 0% 0%; }
            25% { background-position: 5% 0%, -5% 0%, 0% 5%, 5% -5%; }
            50% { background-position: -5% 5%, 5% -5%, 5% 0%, -5% 5%; }
            75% { background-position: 5% -5%, -5% 5%, -5% 5%, 5% 0%; }
            100% { background-position: 0% 0%, 0% 0%, 0% 0%, 0% 0%; }
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 6, 5, 0.6);
            z-index: 0;
            pointer-events: none;
        }

        /* ===== КНИГА ===== */
        .book-overlay {
            position: fixed;
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        .book-overlay.visible { opacity: 1; }
        .book-icon {
            font-size: 4.5rem;
            color: rgba(255, 255, 255, 0.15);
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.05), 0 0 80px rgba(255, 255, 255, 0.02);
            animation: bookAppear 3s ease-in-out forwards;
            display: block;
        }
        @keyframes bookAppear {
            0% { transform: scale(0.3) rotate(-15deg) translateY(20px); opacity: 0; }
            20% { transform: scale(1.2) rotate(5deg) translateY(-5px); opacity: 1; }
            40% { transform: scale(1) rotate(0deg) translateY(0px); opacity: 1; }
            70% { transform: scale(1) rotate(0deg) translateY(0px); opacity: 0.9; }
            85% { transform: scale(1.1) rotate(-3deg) translateY(-3px); opacity: 0.8; }
            100% { transform: scale(0.4) rotate(10deg) translateY(30px); opacity: 0; }
        }
        .book-pos-1 { top: 10%; left: 10%; }
        .book-pos-2 { top: 20%; right: 15%; }
        .book-pos-3 { bottom: 25%; left: 20%; }
        .book-pos-4 { bottom: 30%; right: 10%; }
        .book-pos-5 { top: 45%; left: 5%; }
        .book-pos-6 { top: 50%; right: 5%; }
        .book-pos-7 { bottom: 10%; left: 35%; }
        .book-pos-8 { top: 5%; left: 45%; }

        /* ===== ОСНОВНОЙ КОНТЕНТ ===== */
        .archive-content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            opacity: 0;
            clip-path: inset(100% 0% 0% 0%);
            transform: scale(0.95);
        }
        .archive-content.appear-stripes {
            animation: appearStripes 1.2s ease forwards;
        }
        @keyframes appearStripes {
            0% { opacity: 0; clip-path: inset(100% 0% 0% 0%); transform: scale(0.95); }
            15% { opacity: 0.2; clip-path: inset(80% 0% 0% 0%); }
            30% { opacity: 0.4; clip-path: inset(60% 0% 0% 0%); }
            45% { opacity: 0.6; clip-path: inset(40% 0% 0% 0%); }
            60% { opacity: 0.8; clip-path: inset(20% 0% 0% 0%); }
            75% { opacity: 0.9; clip-path: inset(10% 0% 0% 0%); }
            90% { opacity: 1; clip-path: inset(2% 0% 0% 0%); }
            100% { opacity: 1; clip-path: inset(0% 0% 0% 0%); transform: scale(1); }
        }

        /* ===== СЧЁТЧИК ОНЛАЙН ===== */
        .online-counter {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 200, 100, 0.08);
            border-radius: 40px;
            padding: 8px 22px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255, 200, 100, 0.7);
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            user-select: none;
        }
        .online-counter .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulseDot 2s infinite;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.3);
        }
        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }
        .online-counter .count {
            font-weight: 700;
            color: #fff;
            font-size: 1.1rem;
            min-width: 20px;
            display: inline-block;
            text-align: center;
        }
        .online-counter .label {
            font-weight: 400;
            color: rgba(255, 200, 100, 0.5);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ===== ПОЛЕ НИК И IP ===== */
        .user-info {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 200, 100, 0.04);
            border-radius: 30px;
            padding: 4px 8px 4px 16px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
            pointer-events: auto;
        }
        .user-info .ip-display {
            color: rgba(255, 200, 100, 0.5);
            font-weight: 400;
            letter-spacing: 0.5px;
            font-size: 0.7rem;
        }
        .user-info .nick-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 4px 12px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.75rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            width: 100px;
            transition: 0.3s;
        }
        .user-info .nick-input:focus {
            border-color: rgba(255, 200, 100, 0.15);
            background: rgba(255, 255, 255, 0.05);
        }
        .user-info .nick-input::placeholder {
            color: rgba(255, 255, 255, 0.15);
        }
        .user-info .nick-label {
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .user-info .save-btn {
            background: rgba(255, 200, 100, 0.05);
            border: 1px solid rgba(255, 200, 100, 0.05);
            border-radius: 20px;
            padding: 4px 12px;
            color: rgba(255, 200, 100, 0.3);
            font-size: 0.6rem;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .user-info .save-btn:hover {
            background: rgba(255, 200, 100, 0.08);
            border-color: rgba(255, 200, 100, 0.1);
            color: rgba(255, 200, 100, 0.5);
        }
        .user-info .cooldown {
            color: rgba(255, 200, 100, 0.15);
            font-size: 0.55rem;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* ===== ПРОЦЕНТЫ И ШКАЛА ===== */
        .progress-label {
            font-size: 8rem;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #ff3b3b, #cc0000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 60px rgba(255, 0, 0, 0.15);
            line-height: 1;
            margin-bottom: 1.5rem;
        }
        .progress-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto 1.5rem;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 60px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }
        .progress-bar {
            height: 20px;
            width: 4%;
            background: linear-gradient(90deg, #ff3b3b, #cc0000);
            border-radius: 60px;
            transition: width 1.5s ease;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }
        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* ===== СТРЕЛКА + СТОЛБЕЦ ===== */
        .archive-toggle {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 0.5rem;
            cursor: pointer;
            user-select: none;
        }
        .archive-arrow {
            font-size: 2.5rem;
            color: rgba(255, 60, 60, 0.8);
            transition: transform 0.4s ease, color 0.3s ease;
            display: inline-block;
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 0, 0, 0.04);
            background: rgba(255, 0, 0, 0.01);
        }
        .archive-arrow:hover {
            color: rgba(255, 80, 80, 0.9);
            border-color: rgba(255, 0, 0, 0.06);
        }
        .archive-arrow.open { transform: rotate(180deg); }
        .archive-column {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease, padding 0.5s ease;
            opacity: 0;
            padding: 0 20px;
            width: 100%;
        }
        .archive-column.open {
            max-height: 200px;
            opacity: 1;
            padding: 16px 20px 8px 20px;
        }
        .archive-column-inner {
            background: rgba(255, 0, 0, 0.02);
            border: 1px solid rgba(255, 0, 0, 0.04);
            border-radius: 16px;
            padding: 16px 20px;
            backdrop-filter: blur(4px);
        }
        .archive-column-inner .archive-status {
            font-size: 2rem;
            font-weight: 700;
            color: rgba(255, 200, 50, 0.8);
            letter-spacing: 3px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin: 0;
        }
        .archive-column-inner .archive-status i {
            color: rgba(255, 200, 50, 0.6);
            font-size: 1.6rem;
        }

        /* ===== КНОПКИ ===== */
        .back-link {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 2;
            color: rgba(180, 150, 120, 0.6);
            font-size: 0.8rem;
            text-decoration: none;
            transition: 0.3s;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 200, 100, 0.04);
            backdrop-filter: blur(4px);
        }
        .back-link:hover {
            color: rgba(200, 170, 140, 0.8);
            border-color: rgba(255, 200, 100, 0.08);
        }
        .back-link i { margin-right: 6px; }

        .secret-link {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 2;
            display: block;
            width: 60px;
            height: 60px;
            background: transparent;
            border: none;
            cursor: pointer;
            opacity: 0;
            pointer-events: auto;
        }
        .secret-hint {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 1px dashed rgba(255, 200, 100, 0.02);
            pointer-events: none;
            transition: 0.4s;
        }
        .secret-hint::after {
            content: '⬡';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 200, 100, 0.015);
            font-size: 1.2rem;
            animation: pulseHint 4s infinite;
        }
        @keyframes pulseHint {
            0%, 100% { opacity: 0.15; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.4; transform: translate(-50%, -50%) scale(1.1); }
        }
        .secret-link:hover + .secret-hint {
            border-color: rgba(255, 200, 100, 0.06);
        }
        .secret-link:hover + .secret-hint::after {
            color: rgba(255, 200, 100, 0.06);
        }

        @media (max-width: 600px) {
            .progress-label { font-size: 5rem; }
            .archive-arrow { font-size: 2rem; }
            .archive-column-inner .archive-status { font-size: 1.4rem; letter-spacing: 3px; }
            .progress-container { max-width: 300px; }
            .secret-link { width: 50px; height: 50px; bottom: 20px; right: 20px; }
            .secret-hint { width: 50px; height: 50px; bottom: 20px; right: 20px; }
            .book-icon { font-size: 3rem; }
            .online-counter { top: 12px; padding: 6px 16px; font-size: 0.75rem; gap: 8px; }
            .online-counter .count { font-size: 0.95rem; }
            .online-counter .dot { width: 8px; height: 8px; }
            .user-info { top: 65px; padding: 4px 6px 4px 12px; flex-wrap: wrap; justify-content: center; }
            .user-info .nick-input { width: 80px; font-size: 0.65rem; }
            .user-info .ip-display { font-size: 0.6rem; }
        }
    </style>
</head>
<body>

    <!-- ===== СЧЁТЧИК ОНЛАЙН ===== -->
    <div class="online-counter">
        <span class="dot"></span>
        <span class="label">онлайн</span>
        <span class="count" id="onlineCount">0</span>
    </div>

    <!-- ===== ПОЛЕ С IP И НИКОМ ===== -->
    <div class="user-info" id="userInfo">
        <span class="ip-display" id="ipDisplay">–</span>
        <span class="nick-label">ник</span>
        <input type="text" class="nick-input" id="nickInput" placeholder="введи ник" maxlength="16">
        <button class="save-btn" id="saveNickBtn">✔</button>
        <span class="cooldown" id="cooldownDisplay"></span>
    </div>

    <!-- КНИГА -->
    <div id="bookContainer"></div>

    <div class="archive-content" id="archiveContent">
        <div class="progress-label">4%</div>
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        <div class="archive-toggle" id="archiveToggle">
            <div class="archive-arrow" id="archiveArrow">
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="archive-column" id="archiveColumn">
                <div class="archive-column-inner">
                    <div class="archive-status">
                        <i class="fas fa-spinner fa-pulse"></i> процесс разархивации...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> назад
    </a>

    <a href="https://qwe123zxc0909.github.io/Gearssite.github.io/" 
       class="secret-link" 
       target="_blank" 
       title=" ">
    </a>
    <div class="secret-hint"></div>

    <script>
        // ================================================================
        // 1. РЕАЛЬНЫЙ СЧЁТЧИК ОНЛАЙН (ЧЕРЕЗ whos.amung.us)
        // ================================================================
        const countElement = document.getElementById('onlineCount');

        // Вставляем виджет для реального подсчёта
        (function() {
            const script = document.createElement('script');
            script.type = 'text/javascript';
            script.async = true;
            script.src = 'https://widgets.amung.us/classic.js';
            
            script.onload = function() {
                // Пытаемся получить реальное число из виджета
                setTimeout(() => {
                    const widget = document.querySelector('.amungus-counter');
                    if (widget) {
                        const count = widget.getAttribute('data-visitors');
                        if (count && count !== '0') {
                            countElement.textContent = count;
                        }
                    }
                }, 2000);
            };

            document.head.appendChild(script);
        })();

        // Фолбек: если виджет не загрузился, показываем реальное количество через API
        // Используем бесплатный API для подсчёта посетителей
        async function getRealOnlineCount() {
            try {
                // Используем бесплатный сервис для подсчёта
                const response = await fetch('https://api.countapi.xyz/hit/staffstudio_online/visitors');
                const data = await response.json();
                if (data && data.value) {
                    countElement.textContent = data.value;
                }
            } catch (e) {
                // Если API не работает, оставляем фолбек
                console.log('Счётчик через API не работает');
            }
        }

        // Запускаем реальный счётчик через API каждые 30 секунд
        getRealOnlineCount();
        setInterval(getRealOnlineCount, 30000);

        // ================================================================
        // 2. IP И НИК (через localStorage)
        // ================================================================
        const ipDisplay = document.getElementById('ipDisplay');
        const nickInput = document.getElementById('nickInput');
        const saveBtn = document.getElementById('saveNickBtn');
        const cooldownDisplay = document.getElementById('cooldownDisplay');

        // Получаем IP через бесплатный сервис
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (e) {
                return '0.0.0.0';
            }
        }

        // Загружаем сохранённые данные
        function loadUserData() {
            const savedNick = localStorage.getItem('staffstudio_nick');
            const savedIP = localStorage.getItem('staffstudio_ip');
            const lastChange = localStorage.getItem('staffstudio_nick_change');

            // Показываем IP
            getIP().then(ip => {
                ipDisplay.textContent = ip;
                // Если IP изменился, сбрасываем ник (безопасность)
                if (savedIP && savedIP !== ip) {
                    localStorage.removeItem('staffstudio_nick');
                    localStorage.removeItem('staffstudio_nick_change');
                    nickInput.value = '';
                } else if (savedNick) {
                    nickInput.value = savedNick;
                }
                // Сохраняем текущий IP
                localStorage.setItem('staffstudio_ip', ip);
            });

            // Проверяем кулдаун
            if (lastChange) {
                const timePassed = (Date.now() - parseInt(lastChange)) / 1000 / 60; // в минутах
                if (timePassed < 60) {
                    const remain = Math.ceil(60 - timePassed);
                    cooldownDisplay.textContent = `⏳ ${remain}м`;
                    saveBtn.disabled = true;
                    saveBtn.style.opacity = '0.3';
                    // Обновляем каждую минуту
                    const interval = setInterval(() => {
                        const newTimePassed = (Date.now() - parseInt(lastChange)) / 1000 / 60;
                        if (newTimePassed >= 60) {
                            cooldownDisplay.textContent = '';
                            saveBtn.disabled = false;
                            saveBtn.style.opacity = '1';
                            clearInterval(interval);
                        } else {
                            const remain2 = Math.ceil(60 - newTimePassed);
                            cooldownDisplay.textContent = `⏳ ${remain2}м`;
                        }
                    }, 60000);
                }
            }
        }

        // Сохраняем ник
        function saveNick() {
            const nick = nickInput.value.trim();
            if (nick.length < 2) {
                alert('Минимум 2 символа');
                return;
            }
            if (nick.length > 16) {
                alert('Максимум 16 символов');
                return;
            }

            const lastChange = localStorage.getItem('staffstudio_nick_change');
            if (lastChange) {
                const timePassed = (Date.now() - parseInt(lastChange)) / 1000 / 60;
                if (timePassed < 60) {
                    const remain = Math.ceil(60 - timePassed);
                    alert(`Подожди ${remain} минут(ы) до смены ника`);
                    return;
                }
            }

            localStorage.setItem('staffstudio_nick', nick);
            localStorage.setItem('staffstudio_nick_change', Date.now().toString());
            cooldownDisplay.textContent = '⏳ 60м';
            saveBtn.disabled = true;
            saveBtn.style.opacity = '0.3';

            // Обновляем отображение
            updateDisplay();

            // Через 60 минут разблокируем
            setTimeout(() => {
                cooldownDisplay.textContent = '';
                saveBtn.disabled = false;
                saveBtn.style.opacity = '1';
            }, 60000 * 60);
        }

        // Обновляем отображение IP/ник
        function updateDisplay() {
            const savedNick = localStorage.getItem('staffstudio_nick');
            if (savedNick) {
                ipDisplay.textContent = savedNick;
                ipDisplay.style.color = 'rgba(255, 200, 100, 0.7)';
            } else {
                getIP().then(ip => {
                    ipDisplay.textContent = ip;
                    ipDisplay.style.color = 'rgba(255, 200, 100, 0.5)';
                });
            }
        }

        // Обработчики
        saveBtn.addEventListener('click', saveNick);
        nickInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') saveNick();
        });

        // Загружаем данные
        loadUserData();
        // Обновляем отображение каждые 5 секунд (на случай, если ник изменился в другой вкладке)
        setInterval(updateDisplay, 5000);

        // ================================================================
        // ТОГГЛ СТОЛБЦА
        // ================================================================
        const toggle = document.getElementById('archiveToggle');
        const arrow = document.getElementById('archiveArrow');
        const column = document.getElementById('archiveColumn');

        toggle.addEventListener('click', function(e) {
            e.stopPropagation();
            arrow.classList.toggle('open');
            column.classList.toggle('open');
        });

        // ================================================================
        // ПОЯВЛЕНИЕ СТРАНИЦЫ
        // ================================================================
        const content = document.getElementById('archiveContent');
        setTimeout(() => {
            content.classList.add('appear-stripes');
        }, 100);

        // ================================================================
        // КНИГА
        // ================================================================
        const bookContainer = document.getElementById('bookContainer');
        const positions = [
            'book-pos-1', 'book-pos-2', 'book-pos-3', 'book-pos-4',
            'book-pos-5', 'book-pos-6', 'book-pos-7', 'book-pos-8'
        ];

        function showBook() {
            const oldBook = bookContainer.querySelector('.book-overlay');
            if (oldBook) oldBook.remove();

            const wrapper = document.createElement('div');
            wrapper.className = 'book-overlay visible';
            const randomPos = positions[Math.floor(Math.random() * positions.length)];
            wrapper.classList.add(randomPos);

            const icon = document.createElement('i');
            icon.className = 'fas fa-book-open book-icon';
            wrapper.appendChild(icon);
            bookContainer.appendChild(wrapper);

            setTimeout(() => {
                wrapper.classList.remove('visible');
                setTimeout(() => {
                    if (wrapper.parentNode) wrapper.remove();
                }, 800);
            }, 3000);
        }

        setTimeout(() => {
            showBook();
            setInterval(showBook, 10000);
        }, 1500);
    </script>
</body>
</html>
